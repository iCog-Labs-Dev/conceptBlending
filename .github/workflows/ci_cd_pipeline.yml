name: CI/CD Workflow

on:
  push:
    branches:
      - PeTTaPorting
  pull_request:
    branches:
      - PeTTaPorting

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Install system Python
      run: |
        sudo apt-get update
        sudo apt-get install -y \
        python3 \
        python3-pip \
        python3-dev \
        build-essential

    # -----------------------------
    # Install System Dependencies
    # -----------------------------
    - name: Install Latest SWI-Prolog
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:swi-prolog/devel
        sudo apt-get update
        sudo apt-get install -y swi-prolog

        VERSION=$(swipl --version | awk '{print $3}')
        echo "Installed SWI-Prolog version: $VERSION"

    # -----------------------------
    # Clone and Install PeTTa
    # -----------------------------
    - name: Clone PeTTa Repository
      run: |
        git clone https://github.com/wendecoder/PeTTa.git

    - name: Install PeTTa in Editable Mode
      run: |
        cd PeTTa
        python3 -m pip install --break-system-packages -e .

    # -----------------------------
    # Install ConceptBlending Dependencies
    # -----------------------------
    - name: Install Python Dependencies
      run: |
        cd PeTTaPorting
        python3 -m pip install --break-system-packages -r requirements.txt

    # -----------------------------
    # Create .env File
    # -----------------------------
    - name: Create .env file with API Keys
      run: |
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > PeTTaPorting/.env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> PeTTaPorting/.env

    - name: Debug Python Paths
      run: |
        which python3
        python3 -c "import sys; print(sys.executable)"
        python3 -c "import numpy; print(numpy.__file__)"

    # -----------------------------
    # Run Tests
    # -----------------------------
    - name: Run Tests
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        cd PeTTaPorting
        python3 scripts/run-tests.py
