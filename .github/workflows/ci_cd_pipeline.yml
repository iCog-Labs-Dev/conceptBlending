name: CI/CD Workflow

on:
  push:
    branches:
      - CoherenceObjbranch
  pull_request:
    branches:
      - CoherenceObjbranch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11.6'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip==23.1.2
        cd ../conceptBlending/an_infotheoretic_approach
        pip install \
          hyperon==0.2.4 \
          python-dotenv==1.0.1 \
          requests \
          argparse \
          colorama \
          tqdm==4.67.1 \
          pyyaml \
          "cachetools>=5.0.0"

    - name: Create .env file with API Keys
      run: |
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > ../conceptBlending/an_infotheoretic_approach/.env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> ../conceptBlending/an_infotheoretic_approach/.env

    - name: Run Tests
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        cd ../conceptBlending/an_infotheoretic_approach
        python scripts/concept-preprocessing.py
        python scripts/run-tests.py
