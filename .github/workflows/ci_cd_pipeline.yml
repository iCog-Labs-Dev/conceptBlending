name: CI/CD Workflow

on:
  push:
    branches:
      - PeTTaPorting
  pull_request:
    branches:
      - PeTTaPorting

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11.6'

    # -----------------------------
    # Install System Dependencies
    # -----------------------------
    - name: Install Latest SWI-Prolog
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:swi-prolog/devel
        sudo apt-get update
        sudo apt-get install -y swi-prolog

        VERSION=$(swipl --version | awk '{print $3}')
        echo "Installed SWI-Prolog version: $VERSION"

    - name: Upgrade pip
      run: python -m pip install --upgrade pip==23.1.2

    # -----------------------------
    # Clone and Install PeTTa
    # -----------------------------
    - name: Clone PeTTa Repository
      run: |
        git clone https://github.com/wendecoder/PeTTa.git

    - name: Install PeTTa in Editable Mode
      run: |
        cd PeTTa
        pip install -e .

    # -----------------------------
    # Install ConceptBlending Dependencies
    # -----------------------------
    - name: Install Python Dependencies
      run: |
        cd PeTTaPorting
        pip install -r requirements.txt

    # -----------------------------
    # Create .env File
    # -----------------------------
    - name: Create .env file with API Keys
      run: |
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > PeTTaPorting/.env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> PeTTaPorting/.env

    - name: Debug Python Paths
      run: |
        which python
        python -c "import sys; print(sys.executable)"
        python -c "import numpy; print(numpy.__file__)"

    # -----------------------------
    # Run Tests
    # -----------------------------
    - name: Run Tests
      env:
        env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
       
        cd PeTTaPorting
        python scripts/run-tests.py
