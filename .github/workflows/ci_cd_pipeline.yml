name: CI/CD Workflow

on:
  push:
    branches:
      - PeTTaPorting
  pull_request:
    branches:
      - PeTTaPorting

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11.6'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip==23.1.2
        cd ../conceptBlending/PeTTaPorting
        pip install -r requirements.txt

    # -----------------------------
    # Clone and Install PeTTa
    # -----------------------------
    - name: Clone PeTTa Repository
      run: |
        cd ..
        git clone https://github.com/wendecoder/PeTTa.git

    - name: Install PeTTa in Editable Mode
      run: |
        cd ../PeTTa
        pip install -e .

    # -----------------------------
    # Create .env File
    # -----------------------------
    - name: Create .env file with API Keys
      run: |
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > ../conceptBlending/PeTTaPorting/.env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> ../conceptBlending/PeTTaPorting/.env

    # -----------------------------
    # Run Tests
    # -----------------------------
    - name: Run Tests
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        cd ../conceptBlending/PeTTaPorting
        python scripts/run-tests.py